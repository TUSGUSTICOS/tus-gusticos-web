<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Restaurante</title>
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <div class="profile-container">
        <!-- Botones de navegación -->
        <div class="top-buttons">
            <a href="#" class="back-arrow"><i class="fas fa-arrow-left"></i></a>
            <a href="#" class="back-arrow"><i class="fas fa-arrow-left"></i></a>
        </div>

        <h1 class="restaurant-name">Perfil</h1>
        
        <img src="perfil.png" alt="Foto de perfil" class="profile-image">
        
        <form>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
            </div>

            <div class="form-group">
                <label for="apellidos">Apellido</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Ingresa tu apellido" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu email" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña" required>
            </div>

            <div class="two-factor">
                <input type="checkbox" id="two-factor" name="two-factor">
                <label for="two-factor">Activar verificación de dos pasos</label>
            </div>

            <button type="submit" class="save-button">Guardar Cambios</button>
        </form>

        <section class="order-history">
            <h2>Historial de Pedidos</h2>
            
            <div class="order-card">
                <h3>Pedido #1234</h3>
                <div class="order-details">
                    <p>Fecha: 23 Nov 2024</p>
                    <p>Total: $45.900</p>
                    <p>Items: 3 platos</p>
                    <span class="order-status status-completed">Completado</span>
                </div>
            </div>

            <div class="order-card">
                <h3>Pedido #1233</h3>
                <div class="order-details">
                    <p>Fecha: 22 Nov 2024</p>
                    <p>Total: $32.500</p>
                    <p>Items: 2 platos</p>
                    <span class="order-status status-pending">Pendiente</span>
                </div>
            </div>

            <div class="order-card">
                <h3>Pedido #1232</h3>
                <div class="order-details">
                    <p>Fecha: 21 Nov 2024</p>
                    <p>Total: $28.000</p>
                    <p>Items: 2 platos</p>
                    <span class="order-status status-completed">Completado</span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
