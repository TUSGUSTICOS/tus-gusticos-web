<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña Restablecida - Tus Gusticos</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="registro-container">
    <div class="inner-container">
      <div class="header">
        <h2 class="title">¡CONTRASEÑA RESTABLECIDA!</h2>
      </div>
      
      <div class="success-container">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        
        <div class="success-message">
          <p class="success-text">Recuerda tu contraseña y guárdala en un lugar privado, Puedes restablecer tu contraseña las veces que sean necesarias.</p>
        </div>
      </div>
      
      <div class="button-container">
        <button class="btn-entrar">Entrar</button>
      </div>
    </div>
  </div>
</body>
</html>
