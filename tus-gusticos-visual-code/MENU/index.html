<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Restaurante</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- Navbar -->
        <div class="navbar">
            <button class="icon-btn">☰<i class="fas fa-bars"></i></button>
            <img src="LOGO TUS GUSTICOS.jpg" alt="Logo" class="logo">
            <button class="icon-btn">🛒<i class="fas fa-shopping-cart"></i></button>
        </div>

        <!-- Encabezado -->
        <div class="header">
            <h2>¿Qué hay para cenar hoy?</h2>
            <div class="search-bar">
                <input type="text" placeholder="Buscar">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <!-- Categorías -->
        <div class="categories">
            <span class="active">Menú Ejecutivo</span>
            <span>Menú Gourmet</span>
            <span>Menú Infantil</span>
        </div>

        <!-- Menú de Platos -->
        <div class="menu-grid">
            <div class="menu-item">
                <img src="Carne a la plancha.jpg" alt="Carne a la plancha">
                <p>Carne a la plancha</p>
                <span>$12.000</span>
            </div>
            <div class="menu-item">
                <img src="Camarones a la plancha.jpg" alt="Camarones a la plancha">
                <p>Camarones a la plancha</p>
                <span>$18.000</span>
            </div>
            <div class="menu-item">
                <img src="milanesas.jpg" alt="Milanesas con guarnición">
                <p>Milanesas con guarnición</p>
                <span>$17.000</span>
            </div>
            <div class="menu-item">
                <img src="Pastas con salsa.jpg" alt="Pastas con queso">
                <p>Pastas con queso</p>
                <span>$15.500</span>
            </div>
        </div>

        <!-- Íconos Inferiores -->
        <div class="bottom-icons">
            <i class="far fa-heart heart">❤️</i>
            <i class="fas fa-history history">🔄</i>
            <i class="far fa-user profile">👤</i>
        </div>

    </div>

</body>
</html>
