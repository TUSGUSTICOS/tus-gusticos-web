<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Tus Gusticos</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="registro-container">
    <div class="header">
      <a href="#" class="back-arrow"><i class="fas fa-arrow-left"></i></a>
      <h2 class="title">Nueva contraseña</h2>
    </div>
    
    <div class="form-container">
      <div class="question-block">
        <h3 class="question">Crea una contraseña</h3>
        <p class="instruction">Crea una contraseña que tenga al menos 6 letras o números</p>

        <!-- Campo de contraseña con botón de mostrar/ocultar -->
        <div class="password-group">
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
          <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
        </div>

        <div class="password-group">
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña" required>
          <i class="fas fa-eye password-toggle" onclick="toggleConfirmPassword()"></i>
        </div>

        <button class="btn-siguiente">Crear ahora</button>
      </div>
    </div>
    
    <div class="footer">
      <a href="#" class="reset-link">Crear cuenta</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      var passwordField = document.getElementById("password");
      var icon = passwordField.nextElementSibling;
      if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        passwordField.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    function toggleConfirmPassword() {
      var confirmPasswordField = document.getElementById("confirm-password");
      var icon = confirmPasswordField.nextElementSibling;
      if (confirmPasswordField.type === "password") {
        confirmPasswordField.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        confirmPasswordField.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>

</body>
</html>
