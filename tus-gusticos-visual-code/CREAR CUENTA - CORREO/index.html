<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Tus Gusticos</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="registro-container">
    <div class="header">
      <a href="#" class="back-arrow"><i class="fas fa-arrow-left"></i></a>
      <h2 class="title">CREA TU CUENTA</h2>
    </div>
    
    <div class="form-container">
      <div class="question-block">
        <h3 class="question">¿Cuál es tu número de celular o correo electronico?</h3>
        <p class="instruction">Ingresa un número de celular o correo electrónico</p>
        
        <div class="input-group">
          <input type="text" id="nombres" name="Correo electrónico o número de celular" placeholder="Correo electrónico o número de celular" required>
        </div>
        
        <button class="btn-siguiente">Siguiente</button>
      </div>
    </div>
    
    <div class="footer">
      <a href="#" class="reset-link">Restaurar contraseña</a>
    </div>
  </div>
</body>
</html>
