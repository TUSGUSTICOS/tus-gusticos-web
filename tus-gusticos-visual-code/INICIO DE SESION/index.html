<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Tus Gusticos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <header>
            <h1>Restaurante Tus Gusticos</h1>
        </header>
        
        <main>
            <div class="logo-container">
                <img src="LOGO TUS GUSTICOS.jpg" alt="Logo Tus Gusticos" class="login-image">
            </div>
            
            <form class="login-form" id="login-form">
                <h2>Iniciar Sesión</h2>
                
                <div id="error-message" class="error-message" style="display: none;">
                    Usuario o contraseña incorrectos
                </div>
                
                <div class="form-group">
                    <label for="correo">Correo o número de celular:</label>
                    <input 
                        type="text" 
                        id="correo" 
                        name="correo" 
                        placeholder="Ingresa tu correo o celular" 
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="contraseña">Contraseña:</label>
                    <input 
                        type="password" 
                        id="contraseña" 
                        name="contraseña" 
                        placeholder="Ingresa tu contraseña" 
                        required
                    >
                </div>
                
                <button type="submit" class="btn-login">Iniciar Sesión</button>
                
                <p class="forgot-password">
                    <a href="#" id="recuperar">¿Olvidaste tu contraseña?</a>
                </p>
            </form>
        </main>
        
        <footer>
            <p>&copy; 2024 Tus Gusticos. Todos los derechos reservados.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
