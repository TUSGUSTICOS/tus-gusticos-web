<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido - Tus Gusticos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <header>
      <h1>Restaurante Tus Gusticos</h1>
    </header>
    <main>
      <img src="LOGO TUS GUSTICOS.jpg" alt="Restaurante Tus Gusticos" class="login-image">
      
      <div class="welcome-message">
        <h2>¡Bienvenido a Tus Gusticos!</h2>
        <p>El mejor lugar para disfrutar de deliciosos platillos.</p>
      </div>
      
      <div class="buttons-container">
        <button id="btn-entrar" class="primary-button">Entrar</button>
        <button id="btn-crear-cuenta" class="secondary-button">Crear cuenta</button>
      </div>
      
      <!-- Mantenemos el formulario de login pero lo ocultaremos con CSS inicialmente -->
      <form class="login-form" id="login-form" style="display: none;">
        <label for="correo">Correo o Nombre de Usuario:</label>
        <input type="text" id="correo" name="correo" placeholder="Ingresa tu correo o nombre" required>
        
        <label for="contraseña">Contraseña:</label>
        <input type="password" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required>
        
        <button type="submit">Iniciar Sesión</button>
      </form>
    </main>
    <footer>
      <p>&copy; 2024 Tus Gusticos. Todos los derechos reservados.</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
